<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#050505"/>
  <rect width="800" height="400" rx="12" stroke="#ffffff" stroke-opacity="0.1"/>
  
  <!-- Left Side: 2D Slices -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="120" height="100" rx="4" fill="#1a1e26" stroke="#ffffff" stroke-opacity="0.2"/>
    <rect x="10" y="10" width="120" height="100" rx="4" fill="#1a1e26" stroke="#ffffff" stroke-opacity="0.2"/>
    <rect x="20" y="20" width="120" height="100" rx="4" fill="#1a1e26" stroke="#ffffff" stroke-opacity="0.4"/>
    <path d="M40 50C40 40 100 40 100 70" stroke="#00d1ff" stroke-width="2" stroke-opacity="0.5"/>
    <text x="35" y="130" fill="#888888" font-family="Helvetica" font-size="12" text-anchor="middle">2D DICOM Slices</text>
  </g>

  <!-- Middle: MedMind Engine -->
  <g transform="translate(350, 175)">
    <circle cx="50" cy="25" r="60" fill="#00d1ff" fill-opacity="0.05"/>
    <circle cx="50" cy="25" r="40" stroke="#00d1ff" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M50 5C55 5 60 10 60 15C60 20 55 25 50 25C45 25 40 20 40 15C40 10 45 5 50 5Z" fill="#00d1ff"/>
    <text x="50" y="105" fill="#00d1ff" font-family="Helvetica" font-size="14" font-weight="bold" text-anchor="middle">AI SYNTHESIS</text>
  </g>

  <!-- Right Side: 3D Model -->
  <g transform="translate(550, 150)">
    <!-- 3D Poly Brain Concept -->
    <path d="M60 20L100 40L80 90L40 90L20 40L60 20Z" stroke="#00d1ff" stroke-width="2" fill="#00d1ff" fill-opacity="0.1"/>
    <path d="M20 40L100 40M40 90L60 20M80 90L60 20" stroke="#00d1ff" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="60" cy="20" r="3" fill="#00d1ff"/>
    <circle cx="100" cy="40" r="3" fill="#00d1ff"/>
    <circle cx="80" cy="90" r="3" fill="#00d1ff"/>
    <circle cx="40" cy="90" r="3" fill="#00d1ff"/>
    <circle cx="20" cy="40" r="3" fill="#00d1ff"/>
    <text x="60" y="130" fill="#ffffff" font-family="Helvetica" font-size="12" text-anchor="middle">Interactive 3D Geometry</text>
  </g>

  <!-- Connection Arrows -->
  <path d="M250 200H320" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M480 200H550" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" fill-opacity="0.2"/>
    </marker>
  </defs>
</svg>
